replicaCount: 2

image:
  repository: ecommerceacrregistry.azurecr.io/ecommerce-api
  pullPolicy: IfNotPresent
  tag: 3d3ab8cd2a750c85686403ab04633b1bfa9cdc64

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: 
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  PORT: "3000"
  NODE_ENV: "production"

monitoring:
  enabled: true
