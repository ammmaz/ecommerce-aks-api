replicaCount: 2

image:
  repository: ecommerceacrregistry.azurecr.io/ecommerce-api
  pullPolicy: IfNotPresent
  tag: 60bf127cb9a9883423608de3237f3f05ad2f9397

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: 
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  PORT: "3000"
  NODE_ENV: "production"
